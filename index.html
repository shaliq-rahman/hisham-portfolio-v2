<script>
(function () {
    var h2 = document.querySelector('.profile-name h2.hero-title');

    function splitHeroLetters() {
        if (!h2 || h2.getAttribute('data-hero-split') === '1') return;
        h2.setAttribute('data-hero-split', '1');
        var idx = 0;
        h2.querySelectorAll('.hero-line').forEach(function (line) {
            var text = line.textContent;
            line.textContent = '';
            for (var i = 0; i < text.length; i++) {
                var ch = text[i];
                var s = document.createElement('span');
                s.className = 'hero-char';
                s.textContent = ch === ' ' ? '\u00A0' : ch;
                s.style.setProperty('--i', idx++);
                line.appendChild(s);
            }
        });
    }

    function bootHeroSplit() {
        splitHeroLetters();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', bootHeroSplit);
    } else {
        bootHeroSplit();
    }
})();
</script>


<script>
  const counter = document.getElementById('counter');
  const bar = document.getElementById('bar');
  const preloader = document.getElementById('preloader');

  let progress = 0;
  const duration = 2800; // ms total
  const start = performance.now();

  // Prevent background scroll while the preloader is visible.
  // Compensate scrollbar width to avoid layout jump when restoring overflow.
  const body = document.body;
  const docEl = document.documentElement;
  let scrollbarWidth = 0;

  function lockBodyScroll() {
    scrollbarWidth = window.innerWidth - docEl.clientWidth;
    body.style.overflow = 'hidden';
    if (scrollbarWidth > 0) body.style.paddingRight = `${scrollbarWidth}px`;
  }

  function unlockBodyScroll() {
    body.style.overflow = '';
    body.style.paddingRight = '';
  }

  function easeInOutQuart(t) {
    return t < 0.5 ? 8 * t * t * t * t : 1 - Math.pow(-2 * t + 2, 4) / 2;
  }

  function animate(now) {
    const elapsed = now - start;
    const raw = Math.min(elapsed / duration, 1);
    const eased = easeInOutQuart(raw);
    progress = Math.round(eased * 100);

    counter.textContent = progress;
    bar.style.width = progress + '%';

    if (progress < 100) {
      requestAnimationFrame(animate);
    } else {
      setTimeout(() => {
        preloader.classList.add('hide');
        document.body.classList.add('preloader-done');
        setTimeout(() => {
          preloader.style.display = 'none';
          unlockBodyScroll();
        }, 900);
      }, 300);
    }
  }

  lockBodyScroll();
  requestAnimationFrame(animate);
</script>
