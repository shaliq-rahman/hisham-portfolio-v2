  <script>
  var swiper = new Swiper(".gallerySwiper", {
    slidesPerView: 4.2,
    spaceBetween: 30,
    speed: 1000,
    loop: true,                    // âœ… fixed: was string "true", must be boolean
    loopAdditionalSlides: 1,       // âœ… fixes the 0.2 ghost slide appearing first
    centeredSlides: false,         // keep false
  

    // âœ… Autoplay
    autoplay: {
      delay: 3000,
      disableOnInteraction: false,
    },

    // âœ… Navigation
    navigation: {
      nextEl: ".gallery-next",
      prevEl: ".gallery-prev",
    },

    // âœ… Breakpoints
    breakpoints: {
      0: {
        slidesPerView: 1.1,
        spaceBetween: 15,
  
      },
      768: {
        slidesPerView: 2,
        spaceBetween: 20,
      
      },
      1024: {
        slidesPerView: 3.2,
        spaceBetween: 25,
       
      },
      1280: {
        slidesPerView: 4.3,
